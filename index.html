
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Waitlist</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .iframe-container {
            width: 100%;
            height: 100vh;
            border: none;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .fallback {
            display: none;
            text-align: center;
            padding: 50px;
        }
        
        .fallback a {
            color: #0066cc;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://www.waitforit.me/signup/66f7d6f3" 
                title="Join Our Waitlist"
                loading="lazy">
        </iframe>
    </div>
    
    <div class="fallback">
        <p>Unable to load the signup form.</p>
        <a href="https://www.waitforit.me/signup/66f7d6f3" target="_blank">
            Click here to join our waitlist
        </a>
    </div>
    
    <script>
        // Fallback for when iframe fails to load
        document.querySelector('iframe').addEventListener('error', function() {
            document.querySelector('.iframe-container').style.display = 'none';
            document.querySelector('.fallback').style.display = 'block';
        });
    </script>
</body>
</html>
